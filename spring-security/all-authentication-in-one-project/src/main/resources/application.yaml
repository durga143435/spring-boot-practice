spring:
  application:
    name: all-authentication-in-one-project



  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/e10cfe05-170b-4213-a3f1-a8aee8bdad23/v2.0

      client:
        registration:
          durga:
            client-id:
            client-secret:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          durga:
            issuer-uri: https://login.microsoftonline.com/e10cfe05-170b-4213-a3f1-a8aee8bdad23/v2.0

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        security: DEBUG